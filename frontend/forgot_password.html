<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Gym Membership System - Forgot Password</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card glass">
            <div class="auth-header fade-in" style="animation-delay: 0.1s;">
                <div class="brand-icon" style="margin: 0 auto 1rem auto; width: 48px; height: 48px; font-size: 1.5rem;">
                    G</div>
                <h1>Reset Your Password</h1>
                <p>Enter your username and a new secure password.</p>
            </div>

            <form id="forgotPasswordForm" class="fade-in" style="animation-delay: 0.2s;">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="input-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password" placeholder="Enter your new password"
                        required>
                </div>

                <div class="input-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_password"
                        placeholder="Confirm your new password" required>
                </div>

                <button type="submit" class="btn" style="margin-top: 10px;">Reset Password</button>

                <p style="margin-top: 1.5rem; font-size: 0.9rem; text-align: center;">
                    <a href="login.html"
                        style="color: var(--text-secondary); text-decoration: none; transition: var(--transition);"
                        onmouseover="this.style.color='var(--text-primary)'"
                        onmouseout="this.style.color='var(--text-secondary)'">← Back to Login</a>
                </p>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/forgot_password.js"></script>
</body>

</html>
