<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Gym Membership System - Registration</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass" style="border-radius: 0; border-right: 1px solid rgba(255,255,255,0.1);">
            <a href="#" class="brand">
                <div class="brand-icon">G</div>
                Automated Gym Membership System
            </a>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" id="backToDashBtn">
                        <span>📊</span> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="registration.html" class="active">
                        <span>👤</span> Registration
                    </a>
                </li>
                <li class="nav-item">
                    <a href="payment.html">
                        <span>💳</span> Payments
                    </a>
                </li>
            </ul>

            <a href="login.html" id="logoutBtn" class="logout-btn">
                <span>🚪</span> Logout
            </a>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="header">
                <h2>Member Registration</h2>
                <div class="user-profile">
                    <span id="userNameDisplay">Receptionist</span>
                    <div class="avatar">R</div>
                </div>
            </header>

            <div class="form-card glass fade-in" style="animation-delay: 0.1s;">
                <h3 style="margin-bottom: 2rem;">Register New Member</h3>
                <form id="regForm">
                    <div class="form-row">
                        <div class="input-group">
                            <label>First Name</label>
                            <input type="text" id="firstName" required>
                        </div>
                        <div class="input-group">
                            <label>Last Name</label>
                            <input type="text" id="lastName" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="tel" id="phone" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Enroll Biometric ID</label>
                            <input type="text" id="biometricId" placeholder="Scan or enter ID (e.g. BIO-XXX)" required>
                        </div>
                        <div class="input-group">
                            <label>Account Password</label>
                            <input type="password" id="password" placeholder="Create a secure password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn" style="margin-top: 1rem;">Complete Registration</button>
                </form>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = sessionStorage.getItem('gym_user');
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(userStr);

            // Security: Members cannot register people
            if (user.role === 'Member') {
                window.location.href = 'member_dashboard.html';
                return;
            }

            document.getElementById('userNameDisplay').textContent = user.username + ' (' + user.role + ')';

            // Set dynamic back button
            const backBtn = document.getElementById('backToDashBtn');
            if (user.role === 'Administrator') {
                backBtn.href = 'dashboard.html';
            } else if (user.role === 'Receptionist') {
                backBtn.href = 'receptionist_dashboard.html';
            }
        });

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const biometricId = document.getElementById('biometricId').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button[type="submit"]');

            btn.disabled = true;
            btn.textContent = 'Registering...';

            try {
                const response = await fetch('/api/receptionist/members/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, phone, biometricId, password })
                });

                const data = await response.json();
                const toast = document.getElementById('toast');

                if (data.success) {
                    toast.textContent = data.message;
                    toast.className = 'toast show success';

                    // Store member_id to prepopulate payment page
                    sessionStorage.setItem('pending_payment_member_id', data.member_id);

                    setTimeout(() => {
                        toast.className = 'toast';
                        window.location.href = 'payment.html';
                    }, 2000);
                } else {
                    toast.textContent = data.message;
                    toast.className = 'toast show error';
                    btn.disabled = false;
                    btn.textContent = 'Complete Registration';
                    setTimeout(() => {
                        toast.className = 'toast';
                    }, 3000);
                }
            } catch (error) {
                const toast = document.getElementById('toast');
                toast.textContent = 'Network error. Please try again.';
                toast.className = 'toast show error';
                btn.disabled = false;
                btn.textContent = 'Complete Registration';
                setTimeout(() => {
                    toast.className = 'toast';
                }, 3000);
            }
        });
    </script>
</body>

</html>
