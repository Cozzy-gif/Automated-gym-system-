<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Gym Membership System - Register</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card glass">
            <div class="auth-header fade-in" style="animation-delay: 0.1s;">
                <div class="brand-icon" style="margin: 0 auto 1rem auto; width: 48px; height: 48px; font-size: 1.5rem;">
                    G</div>
                <h1>Gym Membership System</h1>
                <p>Create a new staff or admin account</p>
            </div>

            <form id="signupForm" class="fade-in" style="animation-delay: 0.2s;">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="input-group">
                    <label for="role">Role</label>
                    <select id="role" name="role"
                        style="width: 100%; padding: 0.9rem 1rem; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 1rem;"
                        required>
                        <option value="" disabled selected>Select Role</option>
                        <option value="Receptionist">Receptionist</option>
                        <option value="Administrator">Administrator</option>
                        <option value="Member">Gym Member</option>
                    </select>
                </div>

                <!-- Extra fields for Gym Members -->
                <div id="memberFields" style="display: none; margin-top: 1rem;">
                    <div class="form-row" style="margin-bottom: 1.5rem;">
                        <div class="input-group" style="margin-bottom: 0;">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" placeholder="First Name">
                        </div>
                        <div class="input-group" style="margin-bottom: 0;">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" placeholder="Last Name">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group" style="margin-bottom: 0;">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Email Address">
                        </div>
                        <div class="input-group" style="margin-bottom: 0;">
                            <label for="phone">Phone</label>
                            <input type="tel" id="phone" name="phone" placeholder="Phone Number">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn" style="margin-top: 1rem;">Register Account</button>

                <p style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
                    Already have an account? <a href="login.html"
                        style="color: var(--primary-color); text-decoration: none; font-weight: 500; transition: var(--transition);"
                        onmouseover="this.style.color='var(--primary-hover)'"
                        onmouseout="this.style.color='var(--primary-color)'">Login here</a>
                </p>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/signup.js"></script>
</body>

</html>
